# CI: lint + test both halves of the app on every push / PR.
#
# This exists because a non-starting backend (missing python-multipart),
# failing tests and lint errors had all landed on main with no gate to catch
# them. Keep it green.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check (ruff)
        run: uv run ruff format --check .
      - name: Test (pytest)
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Match the production image (frontend/Dockerfile uses node 22).
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Build (tsc + vite)
        run: npm run build
      - name: Test (vitest)
        run: npm test

  # Generated TS types must stay in sync with the backend's OpenAPI schema, so
  # they can be the single source of truth instead of drifting (#105). Regenerate
  # here and fail if the committed src/types/api-schema.ts is stale.
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Sync backend dependencies
        working-directory: backend
        run: uv sync --frozen
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Regenerate API types
        working-directory: frontend
        run: npm run api:generate
      - name: Fail if generated types are stale
        run: |
          if ! git diff --quiet -- frontend/src/types/api-schema.ts; then
            echo "::error::frontend/src/types/api-schema.ts is out of date. Run 'npm run api:generate' in frontend/ and commit the result."
            git diff -- frontend/src/types/api-schema.ts
            exit 1
          fi
