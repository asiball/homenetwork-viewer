# homenet — LAN device catalog. Two services: FastAPI backend + nginx-served SPA.
#
#   docker compose up -d --build
#   open http://localhost:8080
#
# The SPA (port 8080) is the only published service; nginx reverse-proxies
# /api to the backend over the internal compose network. Device data lives in
# ./data/devices.json (bind-mounted) so you can edit it from the UI or by hand.

services:
  backend:
    build: ./backend
    image: homenet-backend
    environment:
      HOMENET_DATA_FILE: /data/devices.json
    volumes:
      - ./data:/data
    restart: unless-stopped
    # Run as the host user so the bind-mounted ./data is writable without the
    # host being UID 1000. Defaults match the image's baked-in user (#89).
    #   UID=$(id -u) GID=$(id -g) docker compose up -d
    user: "${UID:-1000}:${GID:-1000}"
    # Give an in-flight sweep time to finish before SIGKILL on `docker stop`.
    stop_grace_period: 15s
    # Bound JSON log growth from per-request + per-sweep INFO lines (#89).
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build: ./frontend
    image: homenet-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
