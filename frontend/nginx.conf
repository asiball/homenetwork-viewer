server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # gzip text assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Defence-in-depth headers (single-user LAN app, but cheap to add).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    # API → backend service (compose network). /api/* is forwarded verbatim.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        # Match the backend's /api/import limit (5 MiB); nginx's 1 MiB default
        # would otherwise 413 a valid catalog import before it reaches FastAPI.
        client_max_body_size 5m;
    }

    # hashed, immutable build assets (incl. bundled fonts)
    location /assets/ {
        expires 30d;
        # nginx only inherits add_header directives from the server block when
        # the location has none of its own; since this block sets
        # Cache-Control, the server-level security headers above would
        # otherwise be silently dropped for everything under /assets/ — repeat
        # them here.
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA history fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
